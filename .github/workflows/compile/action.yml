name: "Compile the package under a pinned C/C++ standard (no R CMD check)"
inputs:
  lang:
    description: "Which compiler to pin: 'c' or 'cxx'"
    required: true
  std:
    description: "The -std value to pin, e.g. gnu99, gnu17, gnu++23"
    required: true

runs:
  using: "composite"
  steps:
    - name: "Compile-only build under -std=${{ inputs.std }}"
      run: |
        set -x

        # Resolve the base compiler R would use for this version (binary only,
        # read against an empty user Makevars so we don't pick up the ccache
        # wrapper the install step wrote).
        empty_makevars="$(mktemp)"
        if [ "${{ inputs.lang }}" = "cxx" ]; then
          var=CXX
          base="$(R_MAKEVARS_USER="$empty_makevars" R CMD config CXX | awk '{print $1}')"
        else
          var=CC
          base="$(R_MAKEVARS_USER="$empty_makevars" R CMD config CC | awk '{print $1}')"
        fi
        rm -f "$empty_makevars"

        # Reuse the ccache Makevars from the install step, then pin the standard
        # on the relevant default compiler. A later assignment wins in make, so
        # this overrides the default standard baked in by the install step while
        # keeping ccache. R CMD INSTALL compiles the native code without running
        # R CMD check.
        makevars="$(mktemp)"
        if [ -f ~/.R/Makevars ]; then
          cp ~/.R/Makevars "$makevars"
        fi
        echo "${var} = ccache ${base} -std=${{ inputs.std }}" >> "$makevars"

        echo "===== Makevars for -std=${{ inputs.std }} build ====="
        cat "$makevars"
        echo "===================================================="

        R_MAKEVARS_USER="$makevars" _R_SHLIB_STRIP_=true R CMD INSTALL .
      shell: bash
